airo Expedition Preparation","speaker":"alice","frameKey":"11","image":"assets/images/frame_11_cairo_expedition_preparation_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/11_alice_cairo_preparation.mp3","audioStart":86.8482563237774,"audioEnd":121.944,"duration":35.0957436762226,"page":4,"pages":4,"text":"Eugene stands over the map with the Webley on his belt. He has become again the man I saw at the front -- collected, quiet, dangerous. Fifteen years of peace have fallen from him in two days, like old skin from a serpent. Beneath it -- the officer. The soldier. The man who knows how to kill, and who has kept his old comrade ready without ever once mistaking readiness for desire.\n\nGod save anyone who stands between that man and his son.","ambience":["assets/sfx/frame11_bazaar_crowd.mp3"]},{"kind":"image","id":"12_image","title":"Frame 12 - Desert Halt","frameKey":"12","image":"assets/images/frame_12_halftrack_desert_halt_eugene_binoculars_alice_hood_v01.png","ambience":["assets/sfx/frame12_desert_sand_wind.mp3","assets/sfx/frame12_camel.mp3"]},{"kind":"page","id":"12_eugene_desert_halt_p01","title":"Frame 12 - Desert Halt","speaker":"eugene","frameKey":"12","image":"assets/images/frame_12_halftrack_desert_halt_eugene_binoculars_alice_hood_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/12_eugene_desert_halt.mp3","audioStart":0,"audioEnd":19.649260103626943,"duration":19.649260103626943,"page":1,"pages":7,"text":"A second-hand half-track, purchased in Cairo for an indecent sum, is a monstrous contraption: part motorcar, part agricultural machine, part act of personal defiance against the desert. It is also the only vehicle we could acquire at such speed that will manage the wadis without a road.","ambience":["assets/sfx/frame12_desert_sand_wind.mp3","assets/sfx/frame12_camel.mp3"]},{"kind":"page","id":"12_eugene_desert_halt_p02","title":"Frame 12 - Desert Halt","speaker":"eugene","frameKey":"12","image":"assets/images/frame_12_halftrack_desert_halt_eugene_binoculars_alice_hood_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/12_eugene_desert_halt.mp3","audioStart":19.649260103626943,"audioEnd":35.19270466321244,"duration":15.543444559585495,"page":2,"pages":7,"text":"No hired party accompanies us. There was no time to find men I could trust, and I shall not deliver the secret of my son's prison into the hands of strangers merely because they know the local tracks.","ambience":["assets/sfx/frame12_desert_sand_wind.mp3","assets/sfx/frame12_camel.mp3"]},{"kind":"page","id":"12_eugene_desert_halt_p03","title":"Frame 12 - Desert Halt","speaker":"eugene","frameKey":"12","image":"assets/images/frame_12_halftrack_desert_halt_eugene_binoculars_alice_hood_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/12_eugene_desert_halt.mp3","audioStart":35.19270466321244,"audioEnd":46.99692435233161,"duration":11.804219689119172,"page":3,"pages":7,"text":"We took advice in Cairo, bought what we required, loaded the machine ourselves, and left before any sensible person could ask where two English aristocrats intended to vanish before dawn.","ambience":["assets/sfx/frame12_desert_sand_wind.mp3","assets/sfx/frame12_camel.mp3"]},{"kind":"page","id":"12_eugene_desert_halt_p04","title":"Frame 12 - Desert Halt","speaker":"eugene","frameKey":"12","image":"assets/images/frame_12_halftrack_desert_halt_eugene_binoculars_alice_hood_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/12_eugene_desert_halt.mp3","audioStart":46.99692435233161,"audioEnd":69.8721823834197,"duration":22.875258031088087,"page":4,"pages":7,"text":"We stop only long enough to check the engine, refill the radiator, and drink water that tastes of hot metal. Alice sits upon the bonnet with the map board across her knees, her hair tied back beneath a scarf, looking for all the world as though a halt in the Egyptian desert were a rather inconvenient garden party.","ambience":["assets/sfx/frame12_desert_sand_wind.mp3","assets/sfx/frame12_camel.mp3"]},{"kind":"page","id":"12_eugene_desert_halt_p05","title":"Frame 12 - Desert Halt","speaker":"eugene","frameKey":"12","image":"assets/images/frame_12_halftrack_desert_halt_eugene_binoculars_alice_hood_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/12_eugene_desert_halt.mp3","audioStart":69.8721823834197,"audioEnd":88.49498860103628,"duration":18.622806217616585,"page":5,"pages":7,"text":"Grandfather's coordinates are copied onto a separate sheet, clipped to her board. She cross-references them against a British military survey from 1916 -- the best we have for this district. The lines agree. The tomb is where Grandfather said it would be.","ambience":["assets/sfx/frame12_desert_sand_wind.mp3","assets/sfx/frame12_camel.mp3"]},{"kind":"page","id":"12_eugene_desert_halt_p06","title":"Frame 12 - Desert Halt","speaker":"eugene","frameKey":"12","image":"assets/images/frame_12_halftrack_desert_halt_eugene_binoculars_alice_hood_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/12_eugene_desert_halt.mp3","audioStart":88.49498860103628,"audioEnd":113.78974507772023,"duration":25.294756476683943,"page":6,"pages":7,"text":"Dust. Heat. Silence. I stand on the running board and scan the horizon through field glasses -- sand, rock, sky, nothing else. And yet I feel... I do not know how to describe it. When we entered the Valley, something changed. As though the air grew thicker.","ambience":["assets/sfx/frame12_desert_sand_wind.mp3","assets/sfx/frame12_camel.mp3"]},{"kind":"page","id":"12_eugene_desert_halt_p07","title":"Frame 12 - Desert Halt","speaker":"eugene","frameKey":"12","image":"assets/images/frame_12_halftrack_desert_halt_eugene_binoculars_alice_hood_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/12_eugene_desert_halt.mp3","audioStart":113.78974507772023,"audioEnd":141.504,"duration":27.714254922279764,"page":7,"pages":7,"text":"As though something -- very large, very old -- turned its head in our direction.\n\nAlice feels it too. I can see it in her face. Mbambwe taught her to hear what others cannot. She says nothing. She has gone pale.\n\nWe are going for our boy. Whatever awaits us.","ambience":["assets/sfx/frame12_desert_sand_wind.mp3","assets/sfx/frame12_camel.mp3"]},{"kind":"image","id":"13_image","title":"Frame 13A - Tomb Entrance, Alice","frameKey":"13","image":"assets/images/frame_13_halftrack_arrival_at_tomb_alone_v02.png","ambience":["assets/sfx/frame13_underground_rumble.mp3"]},{"kind":"page","id":"13a_alice_tomb_entrance_p01","title":"Frame 13A - Tomb Entrance, Alice","speaker":"alice","frameKey":"13","image":"assets/images/frame_13_halftrack_arrival_at_tomb_alone_v02.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/13a_alice_tomb_entrance.mp3","audioStart":0,"audioEnd":24.558114285714282,"duration":24.558114285714282,"page":1,"pages":4,"text":"We came alone.\n\nI write it down because even now, with the tomb before us and the engine ticking itself cool behind my back, the fact seems absurd. We, who have spent our lives surrounded by servants, porters, guides, clerks, drivers, doctors, secretaries, lawyers, and every other useful person an English house can produce -- came alone.","ambience":["assets/sfx/frame13_underground_rumble.mp3"]},{"kind":"page","id":"13a_alice_tomb_entrance_p02","title":"Frame 13A - Tomb Entrance, Alice","speaker":"alice","frameKey":"13","image":"assets/images/frame_13_halftrack_arrival_at_tomb_alone_v02.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/13a_alice_tomb_entrance.mp3","audioStart":24.558114285714282,"audioEnd":52.45845714285714,"duration":27.90034285714286,"page":2,"pages":4,"text":"But secrecy has become more precious than comfort. More precious than caution. There is not a man in Cairo, Luxor, or Qena whom I would trust with Alexander's name and the truth of the Black Stone. So we bought the half-track, loaded it with water, rope, lamps, medicine, ammunition, and every scrap of courage we possessed, and drove until the map had no more lines to give us.","ambience":["assets/sfx/frame13_underground_rumble.mp3"]},{"kind":"page","id":"13a_alice_tomb_entrance_p03","title":"Frame 13A - Tomb Entrance, Alice","speaker":"alice","frameKey":"13","image":"assets/images/frame_13_halftrack_arrival_at_tomb_alone_v02.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/13a_alice_tomb_entrance.mp3","audioStart":52.45845714285714,"audioEnd":92.34722857142856,"duration":39.88877142857142,"page":3,"pages":4,"text":"The tomb entrance is carved into the cliff -- and \"carved\" is the wrong word. It looks as though someone pressed a finger into the rock, and the rock yielded. Perfectly even edges. No tool marks whatsoever. Grandfather described it precisely: \"The entrance was made not by instrument. The entrance was made by intention.\"\n\nSunset. The last light of the day falls upon the cliff, and the shadows from the entrance spread across the sand as though the darkness inside were liquid, and slowly leaking out.","ambience":["assets/sfx/frame13_underground_rumble.mp3"]},{"kind":"page","id":"13a_alice_tomb_entrance_p04","title":"Frame 13A - Tomb Entrance, Alice","speaker":"alice","frameKey":"13","image":"assets/images/frame_13_halftrack_arrival_at_tomb_alone_v02.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/13a_alice_tomb_entrance.mp3","audioStart":92.34722857142856,"audioEnd":122.064,"duration":29.716771428571434,"page":4,"pages":4,"text":"Eugene checks the Webley. Six rounds in the cylinder. A full box in his jacket pocket. I check my bag. Mbambwe's herbs. The Luger. Torches. Rope. Medical kit. Everything I brought. Everything we have.\n\nWe stand before the entrance. He looks at me. I look at him.","ambience":["assets/sfx/frame13_underground_rumble.mp3"]},{"kind":"page","id":"13b_eugene_tomb_entrance_p01","title":"Frame 13B - Tomb Entrance, Eugene","speaker":"eugene","frameKey":"13","image":"assets/images/frame_13_halftrack_arrival_at_tomb_alone_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/13b_eugene_tomb_entrance.mp3","audioStart":0,"audioEnd":30.649335548172758,"duration":30.649335548172758,"page":1,"pages":4,"text":"I know this place. Not from photographs. I know it as one knows a place one has seen in a dream. Grandfather described it in his journal: \"The unnumbered tomb. The workmen refused to enter. I went in alone. Inside it was cold -- not as stone is cold. As a presence is cold. As though someone stands behind one's shoulder.","ambience":["assets/sfx/frame13_underground_rumble.mp3"]},{"kind":"page","id":"13b_eugene_tomb_entrance_p02","title":"Frame 13B - Tomb Entrance, Eugene","speaker":"eugene","frameKey":"13","image":"assets/images/frame_13_halftrack_arrival_at_tomb_alone_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/13b_eugene_tomb_entrance.mp3","audioStart":30.649335548172758,"audioEnd":46.15863787375415,"duration":15.509302325581395,"page":2,"pages":4,"text":"Not hostile. Attentive.\"\n\nGrandfather brought the Stone out of this place. The Stone took Alexander. And now we stand before the door behind which our son waits.","ambience":["assets/sfx/frame13_underground_rumble.mp3"]},{"kind":"page","id":"13b_eugene_tomb_entrance_p03","title":"Frame 13B - Tomb Entrance, Eugene","speaker":"eugene","frameKey":"13","image":"assets/images/frame_13_halftrack_arrival_at_tomb_alone_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/13b_eugene_tomb_entrance.mp3","audioStart":46.15863787375415,"audioEnd":65.6560465116279,"duration":19.497408637873754,"page":3,"pages":4,"text":"Alice looks at me. In her eyes is the same resolve I saw in the hospital, when she dragged me off the triage line against the ruling of three surgeons. This woman does not know how to retreat. It is why I married her.","ambience":["assets/sfx/frame13_underground_rumble.mp3"]},{"kind":"page","id":"13b_eugene_tomb_entrance_p04","title":"Frame 13B - Tomb Entrance, Eugene","speaker":"eugene","frameKey":"13","image":"assets/images/frame_13_halftrack_arrival_at_tomb_alone_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/13b_eugene_tomb_entrance.mp3","audioStart":65.6560465116279,"audioEnd":88.92,"duration":23.263953488372096,"page":4,"pages":4,"text":"I look at her. And I think -- dear God, let us come back. All three. Because if we do not come back, there will be an empty table at the Hall where Alice set three places every evening. And a pony in the stable with no one left to ride her.","ambience":["assets/sfx/frame13_underground_rumble.mp3"]},{"kind":"page","id":"13c_alice_we_are_going_in_p01","title":"Frame 13C - Final Alice Line","speaker":"alice","frameKey":"13","image":"assets/images/frame_13_halftrack_arrival_at_tomb_alone_v02.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/13c_alice_we_are_going_in.mp3","audioStart":0,"audioEnd":1.608,"duration":1.608,"page":1,"pages":1,"text":"We are going in.","ambience":["assets/sfx/frame13_underground_rumble.mp3"]},{"kind":"page","id":"13d_eugene_for_our_boy_p01","title":"Frame 13D - Final Eugene Line","speaker":"eugene","frameKey":"13","image":"assets/images/frame_13_halftrack_arrival_at_tomb_alone_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/13d_eugene_for_our_boy.mp3","audioStart":0,"audioEnd":2.376,"duration":2.376,"page":1,"pages":1,"text":"For our boy.","ambience":["assets/sfx/frame13_underground_rumble.mp3"]},{"kind":"page","id":"13e_together_god_help_anything_p01","title":"Frame 13E - Final Together Line","speaker":"together","frameKey":"13","image":"assets/images/frame_13_halftrack_arrival_at_tomb_alone_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/13e_together_god_help_anything.mp3","audioStart":0,"audioEnd":3.864,"duration":3.864,"page":1,"pages":1,"text":"God help anything that tries to stop us.","ambience":["assets/sfx/frame13_underground_rumble.mp3"]}];
    const stage = document.getElementById('stage');
    const visual = document.getElementById('visual');
    const text = document.getElementById('text');
    const title = document.getElementById('imageTitle');
    const byline = document.getElementById('byline');
    const counter = document.getElementById('counter');
    const start = document.getElementById('start');
    const startBtn = document.getElementById('startBtn');
    let index = 0;
    let voice = new Audio();
    let beds = [];
    let currentBedKey = '';
    let stopTimer = 0;

    function stopAudio() {
      clearTimeout(stopTimer);
      voice.pause();
      voice = new Audio();
      beds.forEach(a => a.pause());
      beds = [];
      currentBedKey = '';
    }

    function playBeds(slide) {
      const key = (slide.ambience || []).join('|');
      if (key === currentBedKey && beds.length) return;
      beds.forEach(a => a.pause());
      beds = [];
      currentBedKey = key;
      beds = (slide.ambience || []).map((src, i) => {
        const a = new Audio(src);
        a.loop = true;
        a.volume = i === 0 ? 0.42 : 0.24;
        a.play().catch(() => {});
        return a;
      });
    }

    function playVoice(slide) {
      if (slide.kind !== 'page') return;
      voice = new Audio(slide.audio);
      voice.volume = 0.96;
      voice.addEventListener('loadedmetadata', () => {
        voice.currentTime = slide.audioStart || 0;
        voice.play().catch(() => {});
        const ms = Math.max(800, ((slide.audioEnd || 0) - (slide.audioStart || 0)) * 1000);
        stopTimer = setTimeout(() => voice.pause(), ms);
      }, {once: true});
    }

    function show(i) {
      clearTimeout(stopTimer);
      voice.pause();
      voice = new Audio();
      index = Math.max(0, Math.min(i, slides.length - 1));
      const slide = slides[index];
      stage.className = slide.speaker || '';
      stage.classList.remove('turn');
      void stage.offsetWidth;
      stage.classList.add('turn');
      visual.src = slide.kind === 'image' ? slide.image : slide.captionBackground;
      visual.classList.add('visible');
      if (slide.kind === 'image') {
        title.textContent = '';
        byline.textContent = '';
        byline.classList.remove('visible');
        text.classList.remove('visible');
        text.textContent = '';
      } else {
        title.textContent = '';
        byline.textContent = slide.speaker === 'alice' ? 'Lady Alice Compton' : 'Lord Eugene Compton';
        byline.classList.add('visible');
        text.textContent = slide.text;
        text.classList.add('visible');
      }
      counter.textContent = (index + 1) + ' / ' + slides.length;
      playBeds(slide);
      playVoice(slide);
    }

    function next() {
      if (index >= slides.length - 1) {
        stopAudio();
        window.close();
        return;
      }
      show(index + 1);
    }

    startBtn.addEventListener('click', () => {
      start.style.display = 'none';
      show(0);
    });
    document.addEventListener('keydown', event => {
      if (start.style.display !== 'none' && (event.key === ' ' || event.key === 'Enter')) {
        startBtn.click();
        return;
      }
      if (event.key === ' ' || event.key === 'Enter') next();
      if (event.key === 'Escape') { stopAudio(); window.close(); }
    });
  </script>
