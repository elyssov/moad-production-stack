  <script>
    const slides = [{"kind":"image","id":"01_image","title":"Frame 01 - Young Eugene, Valley of the Kings","frameKey":"01","image":"assets/images/frame_01_young_eugene_valley_dig_v02.png","ambience":["assets/sfx/frame01_desert_wind.mp3"]},{"kind":"page","id":"01_eugene_valley_of_the_kings_p01","title":"Frame 01 - Young Eugene, Valley of the Kings","speaker":"eugene","frameKey":"01","image":"assets/images/frame_01_young_eugene_valley_dig_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/01_eugene_valley_of_the_kings.mp3","audioStart":0,"audioEnd":22.401590457256464,"duration":22.401590457256464,"page":1,"pages":4,"text":"My family has explored this world since the Empire first set its standard over half the globe. India, Burma, the Sudan, Mesopotamia... We even ventured to the remotest reaches of Russian Siberia, chasing the secrets of the mammoth and the permafrost graves of civilisations no atlas has ever named.","ambience":["assets/sfx/frame01_desert_wind.mp3"]},{"kind":"page","id":"01_eugene_valley_of_the_kings_p02","title":"Frame 01 - Young Eugene, Valley of the Kings","speaker":"eugene","frameKey":"01","image":"assets/images/frame_01_young_eugene_valley_dig_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/01_eugene_valley_of_the_kings.mp3","audioStart":22.401590457256464,"audioEnd":40.322862823061634,"duration":17.92127236580517,"page":2,"pages":4,"text":"Father and I, however, settled our passion upon Egypt. We learnt the language -- not the modern Arabic of the bazaar, but the old tongues: hieroglyphic, hieratic, demotic. We studied the artefacts. We marvelled at the culture.","ambience":["assets/sfx/frame01_desert_wind.mp3"]},{"kind":"page","id":"01_eugene_valley_of_the_kings_p03","title":"Frame 01 - Young Eugene, Valley of the Kings","speaker":"eugene","frameKey":"01","image":"assets/images/frame_01_young_eugene_valley_dig_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/01_eugene_valley_of_the_kings.mp3","audioStart":40.322862823061634,"audioEnd":48.61145129224653,"duration":8.288588469184894,"page":3,"pages":4,"text":"And, it must be said, we collected the inheritance of one ancient Empire for the benefit of the present one.","ambience":["assets/sfx/frame01_desert_wind.mp3"]},{"kind":"page","id":"01_eugene_valley_of_the_kings_p04","title":"Frame 01 - Young Eugene, Valley of the Kings","speaker":"eugene","frameKey":"01","image":"assets/images/frame_01_young_eugene_valley_dig_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/01_eugene_valley_of_the_kings.mp3","audioStart":48.61145129224653,"audioEnd":75.12,"duration":26.508548707753476,"page":4,"pages":4,"text":"Naturally, a good deal of it found its way into the family museum at Compton Hall. One does not send everything to the British Museum. Some pieces belong at home, where a boy can grow up knowing what three thousand years of human endeavour looks like before breakfast.\n\nI was that boy. I am no longer.","ambience":["assets/sfx/frame01_desert_wind.mp3"]},{"kind":"image","id":"02_image","title":"Frame 03 - Young Alice and Mbambwe","frameKey":"02","image":"assets/images/frame_03_young_alice_mbambwe_training_v01.png","ambience":["assets/sfx/frame02_jungle_night.mp3","assets/sfx/frame02_african_drums.mp3","assets/sfx/frame02_fire_crackling.mp3"]},{"kind":"page","id":"02_alice_africa_mbambwe_p01","title":"Frame 03 - Young Alice and Mbambwe","speaker":"alice","frameKey":"02","image":"assets/images/frame_03_young_alice_mbambwe_training_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/02_alice_africa_mbambwe.mp3","audioStart":0,"audioEnd":23.763019059720452,"duration":23.763019059720452,"page":1,"pages":4,"text":"Some people believe Africa to be nothing more than savages, disease, and dangerous beasts. They are not entirely wrong, as far as it goes. But it goes nowhere near far enough. Africa is also the most beautiful country on God's earth, filled with people of extraordinary kindness and simplicity -- a simplicity which is not stupidity, whatever the colonial administrators may tell themselves over their gin.","ambience":["assets/sfx/frame02_jungle_night.mp3","assets/sfx/frame02_african_drums.mp3","assets/sfx/frame02_fire_crackling.mp3"]},{"kind":"page","id":"02_alice_africa_mbambwe_p02","title":"Frame 03 - Young Alice and Mbambwe","speaker":"alice","frameKey":"02","image":"assets/images/frame_03_young_alice_mbambwe_training_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/02_alice_africa_mbambwe.mp3","audioStart":23.763019059720452,"audioEnd":54.38808640406607,"duration":30.62506734434562,"page":2,"pages":4,"text":"Father's work was ethnography -- the study of peoples whom the rest of the Empire preferred not to think about. He took me everywhere. I was seventeen, burnt brown by the sun, and entirely certain I was immortal.\n\nMbambwe was the priestess of Nomkhubulwane -- the Great Mother of Rain, Flesh, and Ancestors. She took one look at me and said I had the hands of a woman who argues with death. I laughed. She did not.","ambience":["assets/sfx/frame02_jungle_night.mp3","assets/sfx/frame02_african_drums.mp3","assets/sfx/frame02_fire_crackling.mp3"]},{"kind":"page","id":"02_alice_africa_mbambwe_p03","title":"Frame 03 - Young Alice and Mbambwe","speaker":"alice","frameKey":"02","image":"assets/images/frame_03_young_alice_mbambwe_training_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/02_alice_africa_mbambwe.mp3","audioStart":54.38808640406607,"audioEnd":86.09329097839898,"duration":31.70520457433291,"page":3,"pages":4,"text":"While Father conducted his interviews and filled his notebooks, Mbambwe and I would sit by the fire, and she would teach me things that are not in any book. Herbs. Bones. The reading of breath. The speaking to that which has ceased to breathe.\n\nI was seventeen, and I thought I was learning philosophy. I was not. I was learning a trade. And the trade had a price that Mbambwe knew and did not tell me.","ambience":["assets/sfx/frame02_jungle_night.mp3","assets/sfx/frame02_african_drums.mp3","assets/sfx/frame02_fire_crackling.mp3"]},{"kind":"page","id":"02_alice_africa_mbambwe_p04","title":"Frame 03 - Young Alice and Mbambwe","speaker":"alice","frameKey":"02","image":"assets/images/frame_03_young_alice_mbambwe_training_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/02_alice_africa_mbambwe.mp3","audioStart":86.09329097839898,"audioEnd":100.008,"duration":13.914709021601013,"page":4,"pages":4,"text":"Sometimes, at night, when the fire was low and the jungle pressed close, I felt certain that real magic existed. Not the parlour tricks of London mediums. The other kind. The kind that listens back.","ambience":["assets/sfx/frame02_jungle_night.mp3","assets/sfx/frame02_african_drums.mp3","assets/sfx/frame02_fire_crackling.mp3"]},{"kind":"image","id":"03_image","title":"Frame 02 - Eugene, WWI Assault","frameKey":"03","image":"assets/images/frame_02_eugene_wwi_assault_gas_tank_v02.png","ambience":["assets/sfx/frame03_artillery_distant.mp3","assets/sfx/frame03_machine_gun.mp3"]},{"kind":"page","id":"03_eugene_wwi_assault_p01","title":"Frame 02 - Eugene, WWI Assault","speaker":"eugene","frameKey":"03","image":"assets/images/frame_02_eugene_wwi_assault_gas_tank_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/03_eugene_wwi_assault.mp3","audioStart":0,"audioEnd":28.27550295857988,"duration":28.27550295857988,"page":1,"pages":4,"text":"The Somme. Ypres. Passchendaele. Again and again and again. The whistle. Rise. The rush.\n\nMy Royal Scots Fusiliers rise behind me, and I have no right -- none whatsoever -- to cowardice or weakness. I am their standard. I am their officer. And by God and by the oath I swore to His Majesty, I shall not fail them.","ambience":["assets/sfx/frame03_artillery_distant.mp3","assets/sfx/frame03_machine_gun.mp3"]},{"kind":"page","id":"03_eugene_wwi_assault_p02","title":"Frame 02 - Eugene, WWI Assault","speaker":"eugene","frameKey":"03","image":"assets/images/frame_02_eugene_wwi_assault_gas_tank_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/03_eugene_wwi_assault.mp3","audioStart":28.27550295857988,"audioEnd":44.81278106508876,"duration":16.537278106508875,"page":2,"pages":4,"text":"Forward. Only forward. Through mud, through pain, through the yellow fog of the gas that burns the lungs and blinds the eyes and does not care whether you are a lord or a lance-corporal. Through the wire. Through the dead.","ambience":["assets/sfx/frame03_artillery_distant.mp3","assets/sfx/frame03_machine_gun.mp3"]},{"kind":"page","id":"03_eugene_wwi_assault_p03","title":"Frame 02 - Eugene, WWI Assault","speaker":"eugene","frameKey":"03","image":"assets/images/frame_02_eugene_wwi_assault_gas_tank_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/03_eugene_wwi_assault.mp3","audioStart":44.81278106508876,"audioEnd":72.24520710059171,"duration":27.432426035502957,"page":3,"pages":4,"text":"Through the things I shall never write down, not in this journal, not in any letter, not to anyone, not ever.\n\nThe Webley in my hand has killed more men than I can count. I am not proud of this. I am not ashamed. I am merely precise. Every round finds its mark. Every mark was a man. Every man had a mother.","ambience":["assets/sfx/frame03_artillery_distant.mp3","assets/sfx/frame03_machine_gun.mp3"]},{"kind":"page","id":"03_eugene_wwi_assault_p04","title":"Frame 02 - Eugene, WWI Assault","speaker":"eugene","frameKey":"03","image":"assets/images/frame_02_eugene_wwi_assault_gas_tank_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/03_eugene_wwi_assault.mp3","audioStart":72.24520710059171,"audioEnd":98.64,"duration":26.394792899408287,"page":4,"pages":4,"text":"I am death. I carry it to the enemy. For King and Country.\n\nAnd when this is over -- if it is ever over -- I shall clean this revolver, oil it, and keep it close. Not as a trophy. Not as a toy. As one keeps an old comrade who did his duty in hell and asked no thanks for it.","ambience":["assets/sfx/frame03_artillery_distant.mp3","assets/sfx/frame03_machine_gun.mp3"]},{"kind":"image","id":"04_image","title":"Frame 04 - Alice, WWI Triage","frameKey":"04","image":"assets/images/frame_04_alice_wwi_triage_v01.png","ambience":["assets/sfx/frame04_rain_canvas_tent.mp3"]},{"kind":"page","id":"04_alice_wwi_triage_p01","title":"Frame 04 - Alice, WWI Triage","speaker":"alice","frameKey":"04","image":"assets/images/frame_04_alice_wwi_triage_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/04_alice_wwi_triage.mp3","audioStart":0,"audioEnd":19.612267413370674,"duration":19.612267413370674,"page":1,"pages":6,"text":"Good Lord... I came down to this hell of my own volition. I made this choice with my own two hands and my own stubborn, stupid, Cholmondeley pride. And now, every night, I weep into my pillow -- when I have the luxury of reaching a pillow at all.","ambience":["assets/sfx/frame04_rain_canvas_tent.mp3"]},{"kind":"page","id":"04_alice_wwi_triage_p02","title":"Frame 04 - Alice, WWI Triage","speaker":"alice","frameKey":"04","image":"assets/images/frame_04_alice_wwi_triage_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/04_alice_wwi_triage.mp3","audioStart":19.612267413370674,"audioEnd":64.63850192509626,"duration":45.02623451172559,"page":2,"pages":6,"text":"The wounded come in a river that does not stop. Stretcher after stretcher after stretcher. And I -- a girl of twenty, with a VAD armband and six months of training -- I stand at the head of the line and play God. I decide who lives. I decide who... No. They will die regardless. But someone must decide who is denied even the hope of treatment, so that the ones who can be saved are not lost waiting behind those who cannot.\n\nTo-day, that someone was I. And yesterday. And to-morrow. And the day after, and the day after that, until this war ends or I do.","ambience":["assets/sfx/frame04_rain_canvas_tent.mp3"]},{"kind":"page","id":"04_alice_wwi_triage_p03","title":"Frame 04 - Alice, WWI Triage","speaker":"alice","frameKey":"04","image":"assets/images/frame_04_alice_wwi_triage_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/04_alice_wwi_triage.mp3","audioStart":64.63850192509626,"audioEnd":88.22367238361919,"duration":23.585170458522924,"page":3,"pages":6,"text":"The soldiers call me \"the girl who argues with God.\" They are not wrong. I argue. I insist. I drag men back from His doorstep by their collars and dare Him to object. Some of them live. Some of them die despite everything. The ones who die -- I remember their faces. Every single one.","ambience":["assets/sfx/frame04_rain_canvas_tent.mp3"]},{"kind":"page","id":"04_alice_wwi_triage_p04","title":"Frame 04 - Alice, WWI Triage","speaker":"alice","frameKey":"04","image":"assets/images/frame_04_alice_wwi_triage_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/04_alice_wwi_triage.mp3","audioStart":88.22367238361919,"audioEnd":124.23204760238013,"duration":36.008375218760946,"page":4,"pages":6,"text":"The first one was barely twenty. Private Thomas Wynn, Welsh, blue-eyed, with shrapnel in places no boy should have to know he possesses. I sat with him until dawn because there was nothing else to do for him, and because no one should die reaching for a hand that is not there. He had a German Luger wrapped in a filthy puttee -- a souvenir, he said, taken fairly, and no good to him now. He pressed it into my palm and made me promise I would keep it.\n\n\"Let it guard you, Lady Angel,\" he said.","ambience":["assets/sfx/frame04_rain_canvas_tent.mp3"]},{"kind":"page","id":"04_alice_wwi_triage_p05","title":"Frame 04 - Alice, WWI Triage","speaker":"alice","frameKey":"04","image":"assets/images/frame_04_alice_wwi_triage_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/04_alice_wwi_triage.mp3","audioStart":124.23204760238013,"audioEnd":160.99716625831294,"duration":36.76511865593281,"page":5,"pages":6,"text":"That is how the nickname began. I told him not to be ridiculous. He smiled, squeezed my hand once, and died.\n\nSince then the Luger has had an odd habit of being where I need it. I have used it on the front when the front came too close to the tents, and I have killed men with it. I write that sentence because truth must be written plainly, or it festers. I do not know whether Thomas would forgive me for what his pistol has done in my hand. I hope he would understand.","ambience":["assets/sfx/frame04_rain_canvas_tent.mp3"]},{"kind":"page","id":"04_alice_wwi_triage_p06","title":"Frame 04 - Alice, WWI Triage","speaker":"alice","frameKey":"04","image":"assets/images/frame_04_alice_wwi_triage_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/04_alice_wwi_triage.mp3","audioStart":160.99716625831294,"audioEnd":180.168,"duration":19.170833741687062,"page":6,"pages":6,"text":"But as heavy as this burden is -- and it is unspeakably, indescribably heavy -- I shall rise to-morrow and force myself through triage once more. Because I do not only condemn. I save those who truly can be saved. And that -- that alone -- is enough to make me stand.","ambience":["assets/sfx/frame04_rain_canvas_tent.mp3"]},{"kind":"image","id":"05_image","title":"Frame 05A - Alice Tends Wounded Eugene","frameKey":"05","image":"assets/images/frame_05_alice_tends_wounded_eugene_hospital_v01.png","ambience":["assets/sfx/frame05_heartbeat.mp3","assets/sfx/frame05_ethereal_chime.mp3"]},{"kind":"page","id":"05a_alice_tends_wounded_eugene_p01","title":"Frame 05A - Alice Tends Wounded Eugene","speaker":"alice","frameKey":"05","image":"assets/images/frame_05_alice_tends_wounded_eugene_hospital_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/05a_alice_tends_wounded_eugene.mp3","audioStart":0,"audioEnd":23.852357504215853,"duration":23.852357504215853,"page":1,"pages":6,"text":"...I saw him at triage. The wounds were dreadful -- shrapnel had opened him from shoulder to hip, and what the shrapnel had not done, the mud and the gas had finished. Three surgeons passed his stretcher. Each one glanced, shook his head, and moved to the next man.\n\nI did not.","ambience":["assets/sfx/frame05_heartbeat.mp3","assets/sfx/frame05_ethereal_chime.mp3"]},{"kind":"page","id":"05a_alice_tends_wounded_eugene_p02","title":"Frame 05A - Alice Tends Wounded Eugene","speaker":"alice","frameKey":"05","image":"assets/images/frame_05_alice_tends_wounded_eugene_hospital_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/05a_alice_tends_wounded_eugene.mp3","audioStart":23.852357504215853,"audioEnd":50.62144350758854,"duration":26.769086003372685,"page":2,"pages":6,"text":"I do not know what it was. I have asked myself a thousand times since. Some instinct -- not medical, not rational, something older and deeper, something Mbambwe would have recognised and nodded at -- told me this man would live. Not should live. Would. As certainty. As fact. As something I knew the way one knows that water is wet and fire is hot.","ambience":["assets/sfx/frame05_heartbeat.mp3","assets/sfx/frame05_ethereal_chime.mp3"]},{"kind":"page","id":"05a_alice_tends_wounded_eugene_p03","title":"Frame 05A - Alice Tends Wounded Eugene","speaker":"alice","frameKey":"05","image":"assets/images/frame_05_alice_tends_wounded_eugene_hospital_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/05a_alice_tends_wounded_eugene.mp3","audioStart":50.62144350758854,"audioEnd":77.19608094435077,"duration":26.57463743676223,"page":3,"pages":6,"text":"I pulled his stretcher to the surgical tent myself. The duty surgeon -- a decent old fellow called Hargreaves, who had been cutting for thirty-six hours without sleep -- told me I was wasting theatre time on a corpse and sent me away. I came back. He told me I was a foolish girl who had fallen in love with a dead man. Perhaps he was right about the first part.","ambience":["assets/sfx/frame05_heartbeat.mp3","assets/sfx/frame05_ethereal_chime.mp3"]},{"kind":"page","id":"05a_alice_tends_wounded_eugene_p04","title":"Frame 05A - Alice Tends Wounded Eugene","speaker":"alice","frameKey":"05","image":"assets/images/frame_05_alice_tends_wounded_eugene_hospital_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/05a_alice_tends_wounded_eugene.mp3","audioStart":77.19608094435077,"audioEnd":115.11355143338955,"duration":37.91747048903878,"page":4,"pages":6,"text":"I remembered Mbambwe's teaching. I had never used it -- not truly, not in earnest, not with intent. But I placed my hands on his chest and I did what she had taught me: I listened for the thread. And I heard it -- faint, fraying, but there. And I pulled.\n\nMy hands began to glow. I was terrified. But I did not stop. And then -- he shuddered, and for a moment, a faint blue light passed through him, and his breathing steadied, and his colour changed, and I knew.","ambience":["assets/sfx/frame05_heartbeat.mp3","assets/sfx/frame05_ethereal_chime.mp3"]},{"kind":"page","id":"05a_alice_tends_wounded_eugene_p05","title":"Frame 05A - Alice Tends Wounded Eugene","speaker":"alice","frameKey":"05","image":"assets/images/frame_05_alice_tends_wounded_eugene_hospital_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/05a_alice_tends_wounded_eugene.mp3","audioStart":115.11355143338955,"audioEnd":143.2437774030354,"duration":28.130225969645863,"page":5,"pages":6,"text":"Ten minutes later, Surgeon-Major Hargreaves made the acquaintance of the full and formidable wrath of the daughter of one of the Empire's most senior lords. Five minutes after that, cursing himself for an old fool and begging my pardon with every stitch, he was closing wounds that he had been quite certain, not twenty minutes prior, were beyond all surgery.\n\nI forgave the old man long ago. And in my heart, I thanked Mbambwe.","ambience":["assets/sfx/frame05_heartbeat.mp3","assets/sfx/frame05_ethereal_chime.mp3"]},{"kind":"page","id":"05a_alice_tends_wounded_eugene_p06","title":"Frame 05A - Alice Tends Wounded Eugene","speaker":"alice","frameKey":"05","image":"assets/images/frame_05_alice_tends_wounded_eugene_hospital_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/05a_alice_tends_wounded_eugene.mp3","audioStart":143.2437774030354,"audioEnd":153.744,"duration":10.50022259696459,"page":6,"pages":6,"text":"For the fact that he survived. And for the certainty -- which I felt as solidly as the floor beneath my feet -- that he would be mine.","ambience":["assets/sfx/frame05_heartbeat.mp3","assets/sfx/frame05_ethereal_chime.mp3"]},{"kind":"page","id":"05b_eugene_remembers_hospital_p01","title":"Frame 05B - Eugene Remembers Hospital","speaker":"eugene","frameKey":"05","image":"assets/images/frame_05_alice_tends_wounded_eugene_hospital_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/05b_eugene_remembers_hospital.mp3","audioStart":0,"audioEnd":22.568546472564393,"duration":22.568546472564393,"page":1,"pages":4,"text":"A close burst of heavy German shell -- I was quite certain it was the last moment of my life. I came to briefly at triage. An angelically beautiful nurse was moving between our bodies, pronouncing our fates with a steady hand and eyes that had seen too much for her age.","ambience":["assets/sfx/frame05_heartbeat.mp3","assets/sfx/frame05_ethereal_chime.mp3"]},{"kind":"page","id":"05b_eugene_remembers_hospital_p02","title":"Frame 05B - Eugene Remembers Hospital","speaker":"eugene","frameKey":"05","image":"assets/images/frame_05_alice_tends_wounded_eugene_hospital_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/05b_eugene_remembers_hospital.mp3","audioStart":22.568546472564393,"audioEnd":33.12107502799552,"duration":10.552528555431131,"page":2,"pages":4,"text":"I caught a glimpse of my own torso, and that glimpse was sufficient to understand that my chances were nil. I lost consciousness.","ambience":["assets/sfx/frame05_heartbeat.mp3","assets/sfx/frame05_ethereal_chime.mp3"]},{"kind":"page","id":"05b_eugene_remembers_hospital_p03","title":"Frame 05B - Eugene Remembers Hospital","speaker":"eugene","frameKey":"05","image":"assets/images/frame_05_alice_tends_wounded_eugene_hospital_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/05b_eugene_remembers_hospital.mp3","audioStart":33.12107502799552,"audioEnd":57.2301366181411,"duration":24.10906159014558,"page":3,"pages":4,"text":"And then I woke again. And it was better. And she was there -- my angel -- sitting beside me, her hand on my chest, and... I could swear her eyes were glowing. A trick of the lamplight, no doubt. One tells oneself these things.","ambience":["assets/sfx/frame05_heartbeat.mp3","assets/sfx/frame05_ethereal_chime.mp3"]},{"kind":"page","id":"05b_eugene_remembers_hospital_p04","title":"Frame 05B - Eugene Remembers Hospital","speaker":"eugene","frameKey":"05","image":"assets/images/frame_05_alice_tends_wounded_eugene_hospital_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/05b_eugene_remembers_hospital.mp3","audioStart":57.2301366181411,"audioEnd":68.784,"duration":11.553863381858903,"page":4,"pages":4,"text":"...Then came surgery, and recovery, and a meeting with my Alice. A meeting after which I ceased to exist.","ambience":["assets/sfx/frame05_heartbeat.mp3","assets/sfx/frame05_ethereal_chime.mp3"]},{"kind":"page","id":"05c_alice_and_we_appeared_p01","title":"Frame 05C - Black Screen Alice Line","speaker":"alice","frameKey":"05","image":"assets/images/frame_05_alice_tends_wounded_eugene_hospital_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/05c_alice_and_we_appeared.mp3","audioStart":0,"audioEnd":2.064,"duration":2.064,"page":1,"pages":1,"text":"...And we appeared.","ambience":["assets/sfx/frame05_heartbeat.mp3","assets/sfx/frame05_ethereal_chime.mp3"]},{"kind":"page","id":"05d_eugene_and_we_appeared_p01","title":"Frame 05D - Black Screen Eugene Line","speaker":"eugene","frameKey":"05","image":"assets/images/frame_05_alice_tends_wounded_eugene_hospital_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/05d_eugene_and_we_appeared.mp3","audioStart":0,"audioEnd":2.664,"duration":2.664,"page":1,"pages":1,"text":"...And we appeared.","ambience":["assets/sfx/frame05_heartbeat.mp3","assets/sfx/frame05_ethereal_chime.mp3"]},{"kind":"image","id":"06_image","title":"Frame 06A - Family Portrait, Alice","frameKey":"06","image":"assets/images/frame_06_family_portrait_before_tragedy_v02.png","ambience":["assets/sfx/frame06_birdsong_garden.mp3","assets/sfx/frame06_children_laughter.mp3","assets/sfx/frame06_fireplace.mp3","assets/sfx/frame06_grandfather_clock.mp3"]},{"kind":"page","id":"06a_alice_family_portrait_p01","title":"Frame 06A - Family Portrait, Alice","speaker":"alice","frameKey":"06","image":"assets/images/frame_06_family_portrait_before_tragedy_v02.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/06a_alice_family_portrait.mp3","audioStart":0,"audioEnd":21.316561247216036,"duration":21.316561247216036,"page":1,"pages":3,"text":"-- Alice]\n\nAlexander is nine to-day. We gave him a pony. Eugene declared that a future lord must sit well in the saddle, and I chose the prettiest little filly in three counties -- a chestnut with a white blaze and the temperament of a duchess who knows precisely how much she is worth.","ambience":["assets/sfx/frame06_birdsong_garden.mp3","assets/sfx/frame06_children_laughter.mp3","assets/sfx/frame06_fireplace.mp3","assets/sfx/frame06_grandfather_clock.mp3"]},{"kind":"page","id":"06a_alice_family_portrait_p02","title":"Frame 06A - Family Portrait, Alice","speaker":"alice","frameKey":"06","image":"assets/images/frame_06_family_portrait_before_tragedy_v02.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/06a_alice_family_portrait.mp3","audioStart":21.316561247216036,"audioEnd":46.328873051224946,"duration":25.01231180400891,"page":2,"pages":3,"text":"Yesterday, however, the birthday was very nearly defeated by Eugene's other great romance: that dreadful Webley. My two boys shut themselves in the workshop for the better part of the afternoon, emerged smelling of oil, brass, and triumph, and spent supper discussing a recoil compensator, strengthened cartridges, and several other improvements which I understood only well enough to be alarmed by. Alexander could hardly eat for excitement.","ambience":["assets/sfx/frame06_birdsong_garden.mp3","assets/sfx/frame06_children_laughter.mp3","assets/sfx/frame06_fireplace.mp3","assets/sfx/frame06_grandfather_clock.mp3"]},{"kind":"page","id":"06a_alice_family_portrait_p03","title":"Frame 06A - Family Portrait, Alice","speaker":"alice","frameKey":"06","image":"assets/images/frame_06_family_portrait_before_tragedy_v02.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/06a_alice_family_portrait.mp3","audioStart":46.328873051224946,"audioEnd":88.896,"duration":42.567126948775055,"page":3,"pages":3,"text":"Eugene pretended to scold him for talking with his mouth full, then answered every question with the gravity of a professor lecturing at Oxford.\n\nWe are so proud of him! He is a whirlwind of questions. He asks about Africa. He asks about Egypt. He asks about wonders and adventures and whether mummies really walk at night. Eugene even -- with a certain amount of grumbling -- tells him war stories, and he never used to speak of the war, not even in our most open, most honest, most private conversations in the dark...\n\nHow I love my boys.","ambience":["assets/sfx/frame06_birdsong_garden.mp3","assets/sfx/frame06_children_laughter.mp3","assets/sfx/frame06_fireplace.mp3","assets/sfx/frame06_grandfather_clock.mp3"]},{"kind":"page","id":"06b_eugene_family_portrait_p01","title":"Frame 06B - Family Portrait, Eugene","speaker":"eugene","frameKey":"06","image":"assets/images/frame_06_family_portrait_before_tragedy_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/06b_eugene_family_portrait.mp3","audioStart":0,"audioEnd":18.91858922914467,"duration":18.91858922914467,"page":1,"pages":3,"text":"We decided to commission a family portrait. Colour photography -- a proper full-plate job, still rare enough to feel like a small scientific expedition in its own right. My darling girl seized upon the idea with such enthusiasm that I found myself, as ever, entirely incapable of saying no to her.","ambience":["assets/sfx/frame06_birdsong_garden.mp3","assets/sfx/frame06_children_laughter.mp3","assets/sfx/frame06_fireplace.mp3","assets/sfx/frame06_grandfather_clock.mp3"]},{"kind":"page","id":"06b_eugene_family_portrait_p02","title":"Frame 06B - Family Portrait, Eugene","speaker":"eugene","frameKey":"06","image":"assets/images/frame_06_family_portrait_before_tragedy_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/06b_eugene_family_portrait.mp3","audioStart":18.91858922914467,"audioEnd":38.16562618796199,"duration":19.247036958817322,"page":2,"pages":3,"text":"In truth, I cannot conceive of a circumstance in which I should ever need to.\n\nAlexander rose to the solemnity of the occasion and managed to suppress his customary delighted grin for the entire duration of the photographer's preparations. One must say -- the equipment is rather fascinating.","ambience":["assets/sfx/frame06_birdsong_garden.mp3","assets/sfx/frame06_children_laughter.mp3","assets/sfx/frame06_fireplace.mp3","assets/sfx/frame06_grandfather_clock.mp3"]},{"kind":"page","id":"06b_eugene_family_portrait_p03","title":"Frame 06B - Family Portrait, Eugene","speaker":"eugene","frameKey":"06","image":"assets/images/frame_06_family_portrait_before_tragedy_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/06b_eugene_family_portrait.mp3","audioStart":38.16562618796199,"audioEnd":62.208,"duration":24.042373812038008,"page":3,"pages":3,"text":"I am considering having a proper colour darkroom installed at the Hall; there is more than sufficient space in the east wing...\n\nAlice and Alexander are so happy that even I cannot maintain the mask of the solemn and dignified lord for longer than ten seconds at a stretch. I love them more than life itself.","ambience":["assets/sfx/frame06_birdsong_garden.mp3","assets/sfx/frame06_children_laughter.mp3","assets/sfx/frame06_fireplace.mp3","assets/sfx/frame06_grandfather_clock.mp3"]},{"kind":"image","id":"07_image","title":"Frame 07 - The Call in the Night","frameKey":"07","image":"assets/images/07b_child_called_into_black_stone_v03_wide.png","ambience":["assets/sfx/frame07_horror_drone.mp3","assets/sfx/frame07_footsteps_corridor.mp3","assets/sfx/frame07_woman_scream.mp3"]},{"kind":"page","id":"07_alice_call_in_the_night_p01","title":"Frame 07 - The Call in the Night","speaker":"alice","frameKey":"07","image":"assets/images/07b_child_called_into_black_stone_v03_wide.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/07_alice_call_in_the_night.mp3","audioStart":0,"audioEnd":28.6435306980656,"duration":28.6435306980656,"page":1,"pages":10,"text":"It happened at night.\n\nThat is the fact I must write first, because every other fact feels less real than that one. Not in the garden. Not in daylight. Not while servants moved through the house and Eugene worked in the library and I could pretend that the world remained ruled by clocks, bells, meals, and reasonable English habits.\n\nNight. The whole house asleep.","ambience":["assets/sfx/frame07_horror_drone.mp3","assets/sfx/frame07_footsteps_corridor.mp3","assets/sfx/frame07_woman_scream.mp3"]},{"kind":"page","id":"07_alice_call_in_the_night_p02","title":"Frame 07 - The Call in the Night","speaker":"alice","frameKey":"07","image":"assets/images/07b_child_called_into_black_stone_v03_wide.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/07_alice_call_in_the_night.mp3","audioStart":28.6435306980656,"audioEnd":48.70055677039529,"duration":20.057026072329688,"page":2,"pages":10,"text":"At first I thought I had dreamt it: a sound without sound, a pressure behind the eyes, a whisper laid directly upon the nerves. Not words. Worse than words. A summons. A hook passed through the soul and drawn tight by a hand that had never been human.","ambience":["assets/sfx/frame07_horror_drone.mp3","assets/sfx/frame07_footsteps_corridor.mp3","assets/sfx/frame07_woman_scream.mp3"]},{"kind":"page","id":"07_alice_call_in_the_night_p03","title":"Frame 07 - The Call in the Night","speaker":"alice","frameKey":"07","image":"assets/images/07b_child_called_into_black_stone_v03_wide.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/07_alice_call_in_the_night.mp3","audioStart":48.70055677039529,"audioEnd":73.2802455845248,"duration":24.57968881412952,"page":3,"pages":10,"text":"There are kinds of fear the body knows before the mind has found a name for them. This was older than fear. It was the knowledge that something vast had shifted in the dark, not toward me, not yet, but toward my child. The house seemed to breathe around it. The walls, the floors, the portraits of dead Comptons -- all of them listening.","ambience":["assets/sfx/frame07_horror_drone.mp3","assets/sfx/frame07_footsteps_corridor.mp3","assets/sfx/frame07_woman_scream.mp3"]},{"kind":"page","id":"07_alice_call_in_the_night_p04","title":"Frame 07 - The Call in the Night","speaker":"alice","frameKey":"07","image":"assets/images/07b_child_called_into_black_stone_v03_wide.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/07_alice_call_in_the_night.mp3","audioStart":73.2802455845248,"audioEnd":108.15063078216988,"duration":34.87038519764508,"page":4,"pages":10,"text":"I did not wake at once. God forgive me. Some small part of me woke before the rest -- the part that Mbambwe had awakened in Africa, the tiny splinter of her power that entered me when I dragged Eugene back from death. It heard the Call. It knew it. It tried to rise while the rest of me lay warm beside my husband, wrapped in sleep, and for several dreadful minutes my son rose from his bed and walked through the dark.\n\nThen I woke screaming.","ambience":["assets/sfx/frame07_horror_drone.mp3","assets/sfx/frame07_footsteps_corridor.mp3","assets/sfx/frame07_woman_scream.mp3"]},{"kind":"page","id":"07_alice_call_in_the_night_p05","title":"Frame 07 - The Call in the Night","speaker":"alice","frameKey":"07","image":"assets/images/07b_child_called_into_black_stone_v03_wide.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/07_alice_call_in_the_night.mp3","audioStart":108.15063078216988,"audioEnd":150.03442052144658,"duration":41.88378973927669,"page":5,"pages":10,"text":"Not a clean scream. Not the elegant cry of a frightened lady in a novel. A raw animal sound, torn up from somewhere below speech.\n\nEugene was on his feet before I had even finished saying Alexander's name. He did not ask how I knew. He saw my face and reached for his dressing gown, his torch, anything his hands could find. I remember seizing his wrist. I remember saying, \"We are too late,\" though I did not know for what. I remember his expression when he looked into my eyes, and only later did he tell me that they were shining faintly blue.","ambience":["assets/sfx/frame07_horror_drone.mp3","assets/sfx/frame07_footsteps_corridor.mp3","assets/sfx/frame07_woman_scream.mp3"]},{"kind":"page","id":"07_alice_call_in_the_night_p06","title":"Frame 07 - The Call in the Night","speaker":"alice","frameKey":"07","image":"assets/images/07b_child_called_into_black_stone_v03_wide.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/07_alice_call_in_the_night.mp3","audioStart":150.03442052144658,"audioEnd":173.6964676198486,"duration":23.662047098402013,"page":6,"pages":10,"text":"I dragged him through the corridors of Compton Hall by instinct alone -- barefoot, half-mad, following a pull inside my bones.\n\nDown the stairs. Across the long gallery. Past portraits of dead Comptons staring down as though they knew and would not speak. Into the Egyptian Gallery.\n\nAnd there he was.","ambience":["assets/sfx/frame07_horror_drone.mp3","assets/sfx/frame07_footsteps_corridor.mp3","assets/sfx/frame07_woman_scream.mp3"]},{"kind":"page","id":"07_alice_call_in_the_night_p07","title":"Frame 07 - The Call in the Night","speaker":"alice","frameKey":"07","image":"assets/images/07b_child_called_into_black_stone_v03_wide.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/07_alice_call_in_the_night.mp3","audioStart":173.6964676198486,"audioEnd":199.39043566021866,"duration":25.693968040370066,"page":7,"pages":10,"text":"Alexander stood before the Black Stone in his nightshirt. The surface was no longer stone. It was a vertical pool of absolute, matte blackness -- not shining, not glowing, not a mirror in any honest sense, but a dead depth in the shape of a mirror. It held him as water holds a body. One arm had already vanished. One shoulder. His chest.","ambience":["assets/sfx/frame07_horror_drone.mp3","assets/sfx/frame07_footsteps_corridor.mp3","assets/sfx/frame07_woman_scream.mp3"]},{"kind":"page","id":"07_alice_call_in_the_night_p08","title":"Frame 07 - The Call in the Night","speaker":"alice","frameKey":"07","image":"assets/images/07b_child_called_into_black_stone_v03_wide.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/07_alice_call_in_the_night.mp3","audioStart":199.39043566021866,"audioEnd":224.95331202691335,"duration":25.562876366694695,"page":8,"pages":10,"text":"And I swear before God -- I swear it knowing how mad it sounds -- there was something around his neck. Not rope. Not cloth. Something pale and slick and jointless, visible only where the torch caught it for the smallest fraction of a second. It tightened, not cruelly, not in anger, but with the dreadful patience of a thing drawing in a fish on a line.","ambience":["assets/sfx/frame07_horror_drone.mp3","assets/sfx/frame07_footsteps_corridor.mp3","assets/sfx/frame07_woman_scream.mp3"]},{"kind":"page","id":"07_alice_call_in_the_night_p09","title":"Frame 07 - The Call in the Night","speaker":"alice","frameKey":"07","image":"assets/images/07b_child_called_into_black_stone_v03_wide.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/07_alice_call_in_the_night.mp3","audioStart":224.95331202691335,"audioEnd":271.75303952901595,"duration":46.7997275021026,"page":9,"pages":10,"text":"He turned his head when we entered. I shall remember his face until the last second of my life. Not pain. Not even terror. Enchantment. Confusion. A little boy waking from one dream into another and not understanding why his mother was screaming.\n\nEugene ran.\n\nSo did I.\n\nWe were too late.\n\nAlexander tried to reach for us. Or perhaps I only need to believe that he did. His fingers slipped across the edge of the black surface as though across wet glass. Then the Stone took him completely, and the darkness folded shut behind him.","ambience":["assets/sfx/frame07_horror_drone.mp3","assets/sfx/frame07_footsteps_corridor.mp3","assets/sfx/frame07_woman_scream.mp3"]},{"kind":"page","id":"07_alice_call_in_the_night_p10","title":"Frame 07 - The Call in the Night","speaker":"alice","frameKey":"07","image":"assets/images/07b_child_called_into_black_stone_v03_wide.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/07_alice_call_in_the_night.mp3","audioStart":271.75303952901595,"audioEnd":311.736,"duration":39.98296047098404,"page":10,"pages":10,"text":"No flash. No thunder. No mercy.\n\nOnly the Black Stone standing in its corner once more: rough on the outside, impossible on the face, matte and silent as a sealed tomb.\n\nIf the surface had remained open for one heartbeat longer, Eugene and I would have gone through it after him. Nightdress, dressing gown, bare feet, no weapons, no plan, no thought at all. We would have dived like fish into hell.\n\nBut the door closed.\n\nAnd our son was on the other side.","ambience":["assets/sfx/frame07_horror_drone.mp3","assets/sfx/frame07_footsteps_corridor.mp3","assets/sfx/frame07_woman_scream.mp3"]},{"kind":"image","id":"08_image","title":"Frame 08A - Parents at the Black Stone, Eugene","frameKey":"08","image":"assets/images/frame_08_parents_inspect_black_stone_living_lord_v02.png","ambience":["assets/sfx/frame08_clock_ticking.mp3","assets/sfx/frame08_wood_creak.mp3"]},{"kind":"page","id":"08a_eugene_black_stone_night_p01","title":"Frame 08A - Parents at the Black Stone, Eugene","speaker":"eugene","frameKey":"08","image":"assets/images/frame_08_parents_inspect_black_stone_living_lord_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/08a_eugene_black_stone_night.mp3","audioStart":0,"audioEnd":26.67851306413302,"duration":26.67851306413302,"page":1,"pages":18,"text":"My wife woke me with murder in her eyes and a ghost-light in them.\n\nThat is not rhetoric. I have seen men wake under shellfire, seen officers rise from mud with half their faces gone and still try to give orders; I know the difference between panic and command. Alice was not panicking. She was already moving.","ambience":["assets/sfx/frame08_clock_ticking.mp3","assets/sfx/frame08_wood_creak.mp3"]},{"kind":"page","id":"08a_eugene_black_stone_night_p02","title":"Frame 08A - Parents at the Black Stone, Eugene","speaker":"eugene","frameKey":"08","image":"assets/images/frame_08_parents_inspect_black_stone_living_lord_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/08a_eugene_black_stone_night.mp3","audioStart":26.67851306413302,"audioEnd":47.46042755344419,"duration":20.78191448931117,"page":2,"pages":18,"text":"Her hand closed on my wrist with such force that the next morning I found bruises in the shape of her fingers.\n\n\"Alexander,\" she said.\n\nThen, before I could ask what had happened:\n\n\"We are too late.\"","ambience":["assets/sfx/frame08_clock_ticking.mp3","assets/sfx/frame08_wood_creak.mp3"]},{"kind":"page","id":"08a_eugene_black_stone_night_p03","title":"Frame 08A - Parents at the Black Stone, Eugene","speaker":"eugene","frameKey":"08","image":"assets/images/frame_08_parents_inspect_black_stone_living_lord_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/08a_eugene_black_stone_night.mp3","audioStart":47.46042755344419,"audioEnd":64.143486935867,"duration":16.68305938242281,"page":3,"pages":18,"text":"Her eyes were blue. Not the colour of her eyes -- I know the colour of my wife's eyes better than I know the map of my own hands -- but lit from behind, faintly, impossibly, like winter lightning seen through cloud.","ambience":["assets/sfx/frame08_clock_ticking.mp3","assets/sfx/frame08_wood_creak.mp3"]},{"kind":"page","id":"08a_eugene_black_stone_night_p04","title":"Frame 08A - Parents at the Black Stone, Eugene","speaker":"eugene","frameKey":"08","image":"assets/images/frame_08_parents_inspect_black_stone_living_lord_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/08a_eugene_black_stone_night.mp3","audioStart":64.143486935867,"audioEnd":90.03099287410929,"duration":25.887505938242285,"page":4,"pages":18,"text":"She pulled me out of bed, thrust my dressing gown at me, seized the electric torch from the table, and dragged me through my own house as if she were following a voice that only she could hear.\n\nI asked her once. She did not answer. She was whispering something under her breath. I caught only fragments:","ambience":["assets/sfx/frame08_clock_ticking.mp3","assets/sfx/frame08_wood_creak.mp3"]},{"kind":"page","id":"08a_eugene_black_stone_night_p05","title":"Frame 08A - Parents at the Black Stone, Eugene","speaker":"eugene","frameKey":"08","image":"assets/images/frame_08_parents_inspect_black_stone_living_lord_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/08a_eugene_black_stone_night.mp3","audioStart":90.03099287410929,"audioEnd":108.43988598574825,"duration":18.40889311163896,"page":5,"pages":18,"text":"\"Not him. Not my boy. We are not in time. Eugene, run.\"\n\nSo I ran.\n\nAnd twenty yards away, across the Egyptian Gallery, I saw my son in the Stone.","ambience":["assets/sfx/frame08_clock_ticking.mp3","assets/sfx/frame08_wood_creak.mp3"]},{"kind":"page","id":"08a_eugene_black_stone_night_p06","title":"Frame 08A - Parents at the Black Stone, Eugene","speaker":"eugene","frameKey":"08","image":"assets/images/frame_08_parents_inspect_black_stone_living_lord_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/08a_eugene_black_stone_night.mp3","audioStart":108.43988598574825,"audioEnd":128.502703087886,"duration":20.062817102137757,"page":6,"pages":18,"text":"Two o'clock in the morning. I stand in the museum gallery in my dressing gown, an electric torch in one hand and a magnifying glass in the other, examining the object that devoured my son. Alice is beside me. She has not changed out of her nightdress.","ambience":["assets/sfx/frame08_clock_ticking.mp3","assets/sfx/frame08_wood_creak.mp3"]},{"kind":"page","id":"08a_eugene_black_stone_night_p07","title":"Frame 08A - Parents at the Black Stone, Eugene","speaker":"eugene","frameKey":"08","image":"assets/images/frame_08_parents_inspect_black_stone_living_lord_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/08a_eugene_black_stone_night.mp3","audioStart":128.502703087886,"audioEnd":157.62614726840857,"duration":29.12344418052257,"page":7,"pages":18,"text":"Neither of us has had the wit, decency, or strength to pretend that clothing matters.\n\nThe Stone gives us nothing.\n\nFifty minutes ago, I saw my boy vanish into it. I saw the surface behave as no surface on God's earth has any right to behave. I saw my son reach back toward us while the blackness swallowed him to the throat.","ambience":["assets/sfx/frame08_clock_ticking.mp3","assets/sfx/frame08_wood_creak.mp3"]},{"kind":"page","id":"08a_eugene_black_stone_night_p08","title":"Frame 08A - Parents at the Black Stone, Eugene","speaker":"eugene","frameKey":"08","image":"assets/images/frame_08_parents_inspect_black_stone_living_lord_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/08a_eugene_black_stone_night.mp3","audioStart":157.62614726840857,"audioEnd":186.1024038004751,"duration":28.476256532066515,"page":8,"pages":18,"text":"And I saw something else.\n\nGod help me, I saw it. A pale coil, or tendril, or rope of living cartilage -- I cannot name it without making the thing smaller than it was -- wound once around his neck and shoulder. It did not thrash. It did not strike. It simply drew him inward with the calm inevitability of a tide.","ambience":["assets/sfx/frame08_clock_ticking.mp3","assets/sfx/frame08_wood_creak.mp3"]},{"kind":"page","id":"08a_eugene_black_stone_night_p09","title":"Frame 08A - Parents at the Black Stone, Eugene","speaker":"eugene","frameKey":"08","image":"assets/images/frame_08_parents_inspect_black_stone_living_lord_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/08a_eugene_black_stone_night.mp3","audioStart":186.1024038004751,"audioEnd":205.5180332541568,"duration":19.415629453681703,"page":9,"pages":18,"text":"By the time my foot touched the gallery floor, Alexander was gone.\n\nAnd now the damned thing stands there as though it were merely an exhibit badly catalogued by a lazy ancestor.\n\nSmooth. Black. Cold.","ambience":["assets/sfx/frame08_clock_ticking.mp3","assets/sfx/frame08_wood_creak.mp3"]},{"kind":"page","id":"08a_eugene_black_stone_night_p10","title":"Frame 08A - Parents at the Black Stone, Eugene","speaker":"eugene","frameKey":"08","image":"assets/images/frame_08_parents_inspect_black_stone_living_lord_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/08a_eugene_black_stone_night.mp3","audioStart":205.5180332541568,"audioEnd":223.06400950118768,"duration":17.545976247030893,"page":10,"pages":18,"text":"Its surface temperature is below that of the room, although the room is warm and has been warm all day. Grandfather noted the same anomaly in his journal. He attached no significance to it. I attached no significance to it.","ambience":["assets/sfx/frame08_clock_ticking.mp3","assets/sfx/frame08_wood_creak.mp3"]},{"kind":"page","id":"08a_eugene_black_stone_night_p11","title":"Frame 08A - Parents at the Black Stone, Eugene","speaker":"eugene","frameKey":"08","image":"assets/images/frame_08_parents_inspect_black_stone_living_lord_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/08a_eugene_black_stone_night.mp3","audioStart":223.06400950118768,"audioEnd":243.48637529691214,"duration":20.42236579572446,"page":11,"pages":18,"text":"Because we were occupied with more interesting things. Papyri. Frescoes. Royal necropolises. An unclassified stone was not a mystery; it was baggage. We walked past. All of us walked past. And my boy paid for our indifference.","ambience":["assets/sfx/frame08_clock_ticking.mp3","assets/sfx/frame08_wood_creak.mp3"]},{"kind":"page","id":"08a_eugene_black_stone_night_p12","title":"Frame 08A - Parents at the Black Stone, Eugene","speaker":"eugene","frameKey":"08","image":"assets/images/frame_08_parents_inspect_black_stone_living_lord_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/08a_eugene_black_stone_night.mp3","audioStart":243.48637529691214,"audioEnd":269.3019714964371,"duration":25.815596199524947,"page":12,"pages":18,"text":"Alice has placed both hands upon the face three times. Nothing. I have tested the edges, the back, the floor beneath it, the frame of rough rock around the black plane. Nothing. No seam. No latch. No depression. No measurable vibration. No inscription visible under electric light, candle flame, or magnifying lens.","ambience":["assets/sfx/frame08_clock_ticking.mp3","assets/sfx/frame08_wood_creak.mp3"]},{"kind":"page","id":"08a_eugene_black_stone_night_p13","title":"Frame 08A - Parents at the Black Stone, Eugene","speaker":"eugene","frameKey":"08","image":"assets/images/frame_08_parents_inspect_black_stone_living_lord_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/08a_eugene_black_stone_night.mp3","audioStart":269.3019714964371,"audioEnd":276.2053064133017,"duration":6.903334916864594,"page":13,"pages":18,"text":"There is only the shape of a door after the door has ceased to be a door.","ambience":["assets/sfx/frame08_clock_ticking.mp3","assets/sfx/frame08_wood_creak.mp3"]},{"kind":"page","id":"08a_eugene_black_stone_night_p14","title":"Frame 08A - Parents at the Black Stone, Eugene","speaker":"eugene","frameKey":"08","image":"assets/images/frame_08_parents_inspect_black_stone_living_lord_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/08a_eugene_black_stone_night.mp3","audioStart":276.2053064133017,"audioEnd":296.9872209026129,"duration":20.78191448931119,"page":14,"pages":18,"text":"Alice wishes to strike it. Then to kiss it. Then to cut her palm and press blood to it, because grief makes barbarians of us all, and because somewhere in her blood something answered that Call before she woke. I hold her by the wrists until she stops shaking.","ambience":["assets/sfx/frame08_clock_ticking.mp3","assets/sfx/frame08_wood_creak.mp3"]},{"kind":"page","id":"08a_eugene_black_stone_night_p15","title":"Frame 08A - Parents at the Black Stone, Eugene","speaker":"eugene","frameKey":"08","image":"assets/images/frame_08_parents_inspect_black_stone_living_lord_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/08a_eugene_black_stone_night.mp3","audioStart":296.9872209026129,"audioEnd":323.23427553444185,"duration":26.247054631828973,"page":15,"pages":18,"text":"Not because I am braver -- good God, what courage; I am frightened to the point of nausea -- but because if the Stone opens for her and takes her as well, then Alexander will be orphaned on both sides of this accursed wall.\n\nThat I should not survive. Physically -- perhaps. In every other sense -- no.","ambience":["assets/sfx/frame08_clock_ticking.mp3","assets/sfx/frame08_wood_creak.mp3"]},{"kind":"page","id":"08a_eugene_black_stone_night_p16","title":"Frame 08A - Parents at the Black Stone, Eugene","speaker":"eugene","frameKey":"08","image":"assets/images/frame_08_parents_inspect_black_stone_living_lord_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/08a_eugene_black_stone_night.mp3","audioStart":323.23427553444185,"audioEnd":336.82521615201904,"duration":13.59094061757719,"page":16,"pages":18,"text":"Therefore we shall not throw ourselves against a closed door. We shall find where the other side is anchored. This thing has a provenance. Grandfather brought it from Egypt.","ambience":["assets/sfx/frame08_clock_ticking.mp3","assets/sfx/frame08_wood_creak.mp3"]},{"kind":"page","id":"08a_eugene_black_stone_night_p17","title":"Frame 08A - Parents at the Black Stone, Eugene","speaker":"eugene","frameKey":"08","image":"assets/images/frame_08_parents_inspect_black_stone_living_lord_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/08a_eugene_black_stone_night.mp3","audioStart":336.82521615201904,"audioEnd":357.03185273159147,"duration":20.206636579572432,"page":17,"pages":18,"text":"Not from \"the Valley of the Kings\" in the clean, modern, catalogue sense that makes curators sound more certain than they are, but from one of the southern wadis beyond the comfortably numbered tombs -- described in his earliest notes by bearings, workmen's warnings, bad air, and an entrance no registry appears to contain.","ambience":["assets/sfx/frame08_clock_ticking.mp3","assets/sfx/frame08_wood_creak.mp3"]},{"kind":"page","id":"08a_eugene_black_stone_night_p18","title":"Frame 08A - Parents at the Black Stone, Eugene","speaker":"eugene","frameKey":"08","image":"assets/images/frame_08_parents_inspect_black_stone_living_lord_v02.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/08a_eugene_black_stone_night.mp3","audioStart":357.03185273159147,"audioEnd":363.288,"duration":6.25614726840854,"page":18,"pages":18,"text":"He wrote everything down.\n\nAnd I have his library.","ambience":["assets/sfx/frame08_clock_ticking.mp3","assets/sfx/frame08_wood_creak.mp3"]},{"kind":"page","id":"08b_alice_black_stone_night_p01","title":"Frame 08B - Parents at the Black Stone, Alice","speaker":"alice","frameKey":"08","image":"assets/images/frame_08_parents_inspect_black_stone_living_lord_v02.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/08b_alice_black_stone_night.mp3","audioStart":0,"audioEnd":15.768,"duration":15.768,"page":1,"pages":1,"text":"He is right. He is always right when I am on the verge of something irrevocable. I hate him for it. And I love him until I cannot breathe.\n\nThe Stone is closed.\n\nSo we must find the other door.","ambience":["assets/sfx/frame08_clock_ticking.mp3","assets/sfx/frame08_wood_creak.mp3"]},{"kind":"image","id":"09_image","title":"Frame 09A - The Library Before Dawn, Eugene","frameKey":"09","image":"assets/images/frame_09_library_valley_of_the_kings_clue_v01.png","ambience":["assets/sfx/frame09_page_turning.mp3","assets/sfx/frame09_pen_writing.mp3"]},{"kind":"page","id":"09a_eugene_library_before_dawn_p01","title":"Frame 09A - The Library Before Dawn, Eugene","speaker":"eugene","frameKey":"09","image":"assets/images/frame_09_library_valley_of_the_kings_clue_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/09a_eugene_library_before_dawn.mp3","audioStart":0,"audioEnd":19.167574554022217,"duration":19.167574554022217,"page":1,"pages":11,"text":"Grandfather's journals. Seven volumes, three crates of field notebooks, loose survey sheets, letters, receipts, sketches, lists of hired men, lists of dead men, and the private vanity of every Victorian explorer: the belief that nothing in the world exists until an Englishman has written it down.","ambience":["assets/sfx/frame09_page_turning.mp3","assets/sfx/frame09_pen_writing.mp3"]},{"kind":"page","id":"09a_eugene_library_before_dawn_p02","title":"Frame 09A - The Library Before Dawn, Eugene","speaker":"eugene","frameKey":"09","image":"assets/images/frame_09_library_valley_of_the_kings_clue_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/09a_eugene_library_before_dawn.mp3","audioStart":19.167574554022217,"audioEnd":29.516607202961968,"duration":10.349032648939751,"page":2,"pages":11,"text":"For once, I am grateful for the vanity.\n\nThe difficulty is that the map names have shifted under our feet.","ambience":["assets/sfx/frame09_page_turning.mp3","assets/sfx/frame09_pen_writing.mp3"]},{"kind":"page","id":"09a_eugene_library_before_dawn_p03","title":"Frame 09A - The Library Before Dawn, Eugene","speaker":"eugene","frameKey":"09","image":"assets/images/frame_09_library_valley_of_the_kings_clue_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/09a_eugene_library_before_dawn.mp3","audioStart":29.516607202961968,"audioEnd":50.43331403567822,"duration":20.916706832716255,"page":3,"pages":11,"text":"\"The Valley of the Kings\" is plain enough when printed on a museum label; it is much less plain in Grandfather's oldest notebooks, where a day may be recorded as \"the Western Wadis,\" \"the southern necropolis,\" \"the dry river beyond the known royal tombs,\" or simply \"the place the men refused after sunset.\"","ambience":["assets/sfx/frame09_page_turning.mp3","assets/sfx/frame09_pen_writing.mp3"]},{"kind":"page","id":"09a_eugene_library_before_dawn_p04","title":"Frame 09A - The Library Before Dawn, Eugene","speaker":"eugene","frameKey":"09","image":"assets/images/frame_09_library_valley_of_the_kings_clue_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/09a_eugene_library_before_dawn.mp3","audioStart":50.43331403567822,"audioEnd":61.07386873106698,"duration":10.640554695388758,"page":4,"pages":11,"text":"A dozen names for one stretch of stone and sand, some formal, some local, several of them contradicting one another at precisely the moment we need precision.","ambience":["assets/sfx/frame09_page_turning.mp3","assets/sfx/frame09_pen_writing.mp3"]},{"kind":"page","id":"09a_eugene_library_before_dawn_p05","title":"Frame 09A - The Library Before Dawn, Eugene","speaker":"eugene","frameKey":"09","image":"assets/images/frame_09_library_valley_of_the_kings_clue_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/09a_eugene_library_before_dawn.mp3","audioStart":61.07386873106698,"audioEnd":82.42785863345675,"duration":21.35398990238977,"page":5,"pages":11,"text":"Alice works beside me. She has wrapped a dressing gown around her nightdress at last, though she has not noticed the belt is tied crooked. She makes coffee strong enough to raise the dead, translates Arabic marginalia where my eyes begin to fail, and marks every possible location on the military survey.","ambience":["assets/sfx/frame09_page_turning.mp3","assets/sfx/frame09_pen_writing.mp3"]},{"kind":"page","id":"09a_eugene_library_before_dawn_p06","title":"Frame 09A - The Library Before Dawn, Eugene","speaker":"eugene","frameKey":"09","image":"assets/images/frame_09_library_valley_of_the_kings_clue_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/09a_eugene_library_before_dawn.mp3","audioStart":82.42785863345675,"audioEnd":111.28854123190845,"duration":28.860682598451703,"page":6,"pages":11,"text":"She does not ask whether I have found it. She knows: if I find it, I shall say. If I do not, I shall say that too. We have never learnt to be silent with one another, but we have learnt to be silent beside one another.\n\nAt twenty minutes past four, Volume Three gives us the first wound in the wall.","ambience":["assets/sfx/frame09_page_turning.mp3","assets/sfx/frame09_pen_writing.mp3"]},{"kind":"page","id":"09a_eugene_library_before_dawn_p07","title":"Frame 09A - The Library Before Dawn, Eugene","speaker":"eugene","frameKey":"09","image":"assets/images/frame_09_library_valley_of_the_kings_clue_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/09a_eugene_library_before_dawn.mp3","audioStart":111.28854123190845,"audioEnd":120.10708313699092,"duration":8.81854190508247,"page":7,"pages":11,"text":"Grandfather's hand -- small, precise, with the characteristic flourishes on the capital letters that he carried from Eton to his dying day:","ambience":["assets/sfx/frame09_page_turning.mp3","assets/sfx/frame09_pen_writing.mp3"]},{"kind":"page","id":"09a_eugene_library_before_dawn_p08","title":"Frame 09A - The Library Before Dawn, Eugene","speaker":"eugene","frameKey":"09","image":"assets/images/frame_09_library_valley_of_the_kings_clue_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/09a_eugene_library_before_dawn.mp3","audioStart":120.10708313699092,"audioEnd":140.22210434197243,"duration":20.115021204981502,"page":8,"pages":11,"text":"\"Mirror stone, extracted from an unnumbered tomb at the southern extremity of the dry valley beyond the royal burials. Surface of inexplicable blackness. Not obsidian. Not basalt. Sampling proved impossible -- every instrument slides without marking. The workmen refused to carry it.","ambience":["assets/sfx/frame09_page_turning.mp3","assets/sfx/frame09_pen_writing.mp3"]},{"kind":"page","id":"09a_eugene_library_before_dawn_p09","title":"Frame 09A - The Library Before Dawn, Eugene","speaker":"eugene","frameKey":"09","image":"assets/images/frame_09_library_valley_of_the_kings_clue_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/09a_eugene_library_before_dawn.mp3","audioStart":140.22210434197243,"audioEnd":163.32522652305624,"duration":23.10312218108382,"page":9,"pages":11,"text":"Hassan, the foreman, informed me that his men call the stone 'ba-ka-er' -- 'soul without a mouth.' I have found this term in no known lexicon. The stone was conveyed to camp by sledge, at night, without the presence of the local men. Coordinates of the tomb: ...\"","ambience":["assets/sfx/frame09_page_turning.mp3","assets/sfx/frame09_pen_writing.mp3"]},{"kind":"page","id":"09a_eugene_library_before_dawn_p10","title":"Frame 09A - The Library Before Dawn, Eugene","speaker":"eugene","frameKey":"09","image":"assets/images/frame_09_library_valley_of_the_kings_clue_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/09a_eugene_library_before_dawn.mp3","audioStart":163.32522652305624,"audioEnd":185.91818512285428,"duration":22.592958599798038,"page":10,"pages":11,"text":"Coordinates. Not perfect -- nothing from Grandfather's first survey ever is -- but enough. A chain of bearings, a note about a broken ridge, a sketch of a cliff face, and a remark that at the time meant nothing:\n\n\"Entrance made not by instrument. Rather by intention.\"","ambience":["assets/sfx/frame09_page_turning.mp3","assets/sfx/frame09_pen_writing.mp3"]},{"kind":"page","id":"09a_eugene_library_before_dawn_p11","title":"Frame 09A - The Library Before Dawn, Eugene","speaker":"eugene","frameKey":"09","image":"assets/images/frame_09_library_valley_of_the_kings_clue_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/09a_eugene_library_before_dawn.mp3","audioStart":185.91818512285428,"audioEnd":216.528,"duration":30.60981487714571,"page":11,"pages":11,"text":"Alice stands beside me. She looks at the page. Then at me. Then at the page. We both understand that we have not found a theory.\n\nWe have found an address.\n\nNot the Stone's explanation. Not its mercy. Not our son.\n\nBut the place from which the door was torn.","ambience":["assets/sfx/frame09_page_turning.mp3","assets/sfx/frame09_pen_writing.mp3"]},{"kind":"page","id":"09b_alice_library_road_p01","title":"Frame 09B - The Library Before Dawn, Alice","speaker":"alice","frameKey":"09","image":"assets/images/frame_09_library_valley_of_the_kings_clue_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/09b_alice_library_road.mp3","audioStart":0,"audioEnd":19.776,"duration":19.776,"page":1,"pages":1,"text":"...Mbambwe had a word for such places. Imizila yamathongo -- the paths of the ancestors. She said that some doors open from one side only. But every door has another side. And if you know the road -- you may come to it from without.\n\nWe know the road.","ambience":["assets/sfx/frame09_page_turning.mp3","assets/sfx/frame09_pen_writing.mp3"]},{"kind":"image","id":"10_image","title":"Frame 10A - London to Cairo, Alice","frameKey":"10","image":"assets/images/frame_10_london_to_cairo_map_junkers_v01.png","ambience":["assets/sfx/frame10_propeller_plane.mp3"]},{"kind":"page","id":"10a_alice_packing_croydon_p01","title":"Frame 10A - London to Cairo, Alice","speaker":"alice","frameKey":"10","image":"assets/images/frame_10_london_to_cairo_map_junkers_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/10a_alice_packing_croydon.mp3","audioStart":0,"audioEnd":35.50671596638656,"duration":35.50671596638656,"page":1,"pages":4,"text":"I packed us in four hours. Four hours from Grandfather's journal to a locked trunk. Tickets on the Junkers -- by telephone, through Uncle Archibald's firm, who asked precisely no questions. In our family, one does not ask questions when one hears a certain tone of voice. My tone was precisely that.\n\nPapers. Passports. Letters of introduction for the Cairo authorities -- on stationery bearing the Compton arms, and good Lord, how grateful I am at this moment that our name opens doors faster than any skeleton key.","ambience":["assets/sfx/frame10_propeller_plane.mp3"]},{"kind":"page","id":"10a_alice_packing_croydon_p02","title":"Frame 10A - London to Cairo, Alice","speaker":"alice","frameKey":"10","image":"assets/images/frame_10_london_to_cairo_map_junkers_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/10a_alice_packing_croydon.mp3","audioStart":35.50671596638656,"audioEnd":54.10238655462186,"duration":18.5956705882353,"page":2,"pages":4,"text":"Equipment. Field medical kit. Rope, torches, a full pharmacopoeia. Compass, maps. Mbambwe's herbs -- I have kept them in a tin box in the bedroom for fifteen years, and Eugene has never once asked what is inside. He knew. He respected it.","ambience":["assets/sfx/frame10_propeller_plane.mp3"]},{"kind":"page","id":"10a_alice_packing_croydon_p03","title":"Frame 10A - London to Cairo, Alice","speaker":"alice","frameKey":"10","image":"assets/images/frame_10_london_to_cairo_map_junkers_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/10a_alice_packing_croydon.mp3","audioStart":54.10238655462186,"audioEnd":81.96349579831934,"duration":27.861109243697484,"page":3,"pages":4,"text":"And then -- I saw him open the safe in his study. The Webley lay inside, wrapped in oilcloth, with a full box of .455 beside it, clean as a surgical instrument and much better loved. Eugene unwrapped it, checked the cylinder, and placed it in the trunk with the grave courtesy one pays to an old friend who has just been called back to service.\n\nMy Luger was already there.","ambience":["assets/sfx/frame10_propeller_plane.mp3"]},{"kind":"page","id":"10a_alice_packing_croydon_p04","title":"Frame 10A - London to Cairo, Alice","speaker":"alice","frameKey":"10","image":"assets/images/frame_10_london_to_cairo_map_junkers_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/10a_alice_packing_croydon.mp3","audioStart":81.96349579831934,"audioEnd":115.656,"duration":33.69250420168066,"page":4,"pages":4,"text":"I do not remember packing it. I remember leaving it in the bedroom drawer, where it has slept since the war beneath a folded silk scarf and Thomas Wynn's last letter to his mother, which I never had the courage to post. Yet there it lay beside the field dressings, exactly where my hand would fall if I reached for it in the dark.\n\nNeither he nor I said a word.\n\nWe both knew what it means when this man takes up a weapon again.","ambience":["assets/sfx/frame10_propeller_plane.mp3"]},{"kind":"page","id":"10b_eugene_junkers_p01","title":"Frame 10B - London to Cairo, Eugene","speaker":"eugene","frameKey":"10","image":"assets/images/frame_10_london_to_cairo_map_junkers_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/10b_eugene_junkers.mp3","audioStart":0,"audioEnd":14.227006060606062,"duration":14.227006060606062,"page":1,"pages":4,"text":"London to Cairo. Three engines, too many stops, and nearly a day of unbearable slowness by the time one counts fuel, weather, officials, and the maddening delays of civilised travel.","ambience":["assets/sfx/frame10_propeller_plane.mp3"]},{"kind":"page","id":"10b_eugene_junkers_p02","title":"Frame 10B - London to Cairo, Eugene","speaker":"eugene","frameKey":"10","image":"assets/images/frame_10_london_to_cairo_map_junkers_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/10b_eugene_junkers.mp3","audioStart":14.227006060606062,"audioEnd":32.50705454545455,"duration":18.28004848484849,"page":2,"pages":4,"text":"I looked out of the window at the Mediterranean and thought of the old crossings before the war, when Egypt had meant dust, notebooks, and ambition rather than coordinates torn from a dead man's journal and a loaded revolver in the trunk.","ambience":["assets/sfx/frame10_propeller_plane.mp3"]},{"kind":"page","id":"10b_eugene_junkers_p03","title":"Frame 10B - London to Cairo, Eugene","speaker":"eugene","frameKey":"10","image":"assets/images/frame_10_london_to_cairo_map_junkers_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/10b_eugene_junkers.mp3","audioStart":32.50705454545455,"audioEnd":54.2611393939394,"duration":21.75408484848485,"page":3,"pages":4,"text":"Alice slept, her head upon my shoulder. She had not slept in two days. She fell asleep the instant the aeroplane left the ground -- as though only the movement, only \"we are at last going for him,\" permitted her to release the reins of control.","ambience":["assets/sfx/frame10_propeller_plane.mp3"]},{"kind":"page","id":"10b_eugene_junkers_p04","title":"Frame 10B - London to Cairo, Eugene","speaker":"eugene","frameKey":"10","image":"assets/images/frame_10_london_to_cairo_map_junkers_v01.png","captionBackground":"assets/backgrounds/caption_bg_eugene_underwood_typewriter_v02.png","audio":"assets/voice/10b_eugene_junkers.mp3","audioStart":54.2611393939394,"audioEnd":81.888,"duration":27.626860606060603,"page":4,"pages":4,"text":"I did not sleep. I counted the minutes. Every minute is a minute that my son spends beyond the wall. Alone. He is nine. He must be frightened.\n\nDear God, let him only be frightened. Let that be the worst of it. Please.","ambience":["assets/sfx/frame10_propeller_plane.mp3"]},{"kind":"image","id":"11_image","title":"Frame 11 - Cairo Expedition Preparation","frameKey":"11","image":"assets/images/frame_11_cairo_expedition_preparation_v01.png","ambience":["assets/sfx/frame11_bazaar_crowd.mp3"]},{"kind":"page","id":"11_alice_cairo_preparation_p01","title":"Frame 11 - Cairo Expedition Preparation","speaker":"alice","frameKey":"11","image":"assets/images/frame_11_cairo_expedition_preparation_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/11_alice_cairo_preparation.mp3","audioStart":0,"audioEnd":21.52356155143339,"duration":21.52356155143339,"page":1,"pages":4,"text":"The Cairo bazaar is a sensation, not a place. Heat that strikes the face like an open furnace. Dust that works its way into eyes, mouth, every fold of clothing. The smell of spices, dung, roast meat, and something sweet and floral that I have never been able to identify in all our visits.","ambience":["assets/sfx/frame11_bazaar_crowd.mp3"]},{"kind":"page","id":"11_alice_cairo_preparation_p02","title":"Frame 11 - Cairo Expedition Preparation","speaker":"alice","frameKey":"11","image":"assets/images/frame_11_cairo_expedition_preparation_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/11_alice_cairo_preparation.mp3","audioStart":21.52356155143339,"audioEnd":46.47444182124789,"duration":24.950880269814505,"page":2,"pages":4,"text":"Eugene haggles in Arabic. His Arabic is better than mine -- he learnt it in the Valley, from the foremen and the diggers, and his accent is not Oxonian but Cairene-Luxorian, with the working words and intonations of a man who knows the price of a sack of sand. The merchants respect this. They give him better rates than they would give a tourist.","ambience":["assets/sfx/frame11_bazaar_crowd.mp3"]},{"kind":"page","id":"11_alice_cairo_preparation_p03","title":"Frame 11 - Cairo Expedition Preparation","speaker":"alice","frameKey":"11","image":"assets/images/frame_11_cairo_expedition_preparation_v01.png","captionBackground":"assets/backgrounds/caption_bg_alice_moleskine_campaign_table_v02.png","audio":"assets/voice/11_alice_cairo_preparation.mp3","audioStart":46.47444182124789,"audioEnd":86.8482563237774,"duration":40.37381450252951,"page":3,"pages":4,"text":"I check the list. Water -- thirty litres. Provisions for ten days. Medical supplies -- full field kit, including morphia. Rope -- one hundred metres. Lamps -- kerosene and electric. Batteries. Ammunition -- .455 for the Webley, nine-millimetre Parabellum for my Luger. Yes -- I too carry a weapon. Not Father's, as respectable family mythology would prefer, but Thomas Wynn's: a dead boy's last gift to the woman he called his Lady Angel. It has guarded me before. God help me, I believe it guards me still.","ambience":["assets/sfx/frame11_bazaar_crowd.mp3"]},{"kind":"page","id":"11_alice_cairo_preparation_p04","title":"Frame 11 - C
